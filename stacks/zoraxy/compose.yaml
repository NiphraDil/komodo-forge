services:
  zoraxy:
    image: zoraxydocker/zoraxy:latest
    container_name: zoraxy
    restart: unless-stopped
    ports:
      - 8081:80
      - 4444:443
      - 8008:8000
    volumes:
      - /var/lib/zoraxy/config/:/opt/zoraxy/config/
      - /var/lib/zoraxy/plugin/:/opt/zoraxy/plugin/
      - /var/run/docker.sock:/var/run/docker.sock
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      FASTGEOIP: "true"
      TZ: "Europe/Amsterdam"