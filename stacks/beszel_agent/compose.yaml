services:
  beszel-agent:
    image: "henrygd/beszel-agent-intel:edge"
    container_name: "beszel-agent"
    restart: always
    network_mode: host
    cap_add:
    - CAP_PERFMON
    privileged: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # monitor other disks / partitions by mounting a folder in /extra-filesystems
      # - /mnt/disk/.beszel:/extra-filesystems/sda1:ro
    environment:
      LISTEN: 45876
      KEY: 'ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIGstaHjTsDJ0ZmQDne1pS++jqK4JbVoMnV/9GosuUn77'
      TOKEN: ab2ba4f6-550f-47c6-8d0b-67de9e99bfdb
      INTEL_GPU_DEVICE: drm:/dev/dri/card1
      HUB_URL: https://monitor.zouzounet.nl 
    devices:
      - /dev/dri/card1:/dev/dri/card1  