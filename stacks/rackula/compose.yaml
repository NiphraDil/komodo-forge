# Rackula Development Docker Compose
#
# For self-hosting with persistence, use: deploy/docker-compose.persist.yml
# Documentation: docs/guides/SELF-HOSTING.md
#
# Development usage:
#   docker compose up -d                    # Frontend only (no persistence)
#   docker compose --profile persist up -d  # With API sidecar
#
# Environment variables:
#   RACKULA_PORT: Host port for frontend (default: 8080)
#   RACKULA_LISTEN_PORT: Port nginx listens on inside container (default: 8080)
#   RACKULA_ENABLE_IPV6: IPv6 listen auto-detection (auto|true|false, default: auto)
#   RACKULA_API_PORT: Port the API listens on (default: 3001)
#   API_HOST: API hostname for nginx proxy (default: rackula-api)
#   API_PORT: Derived from RACKULA_API_PORT (for nginx proxy target)
#   RACKULA_CONTAINER_NAME: Frontend container name (default: rackula)
#   RACKULA_API_CONTAINER_NAME: API container name (default: rackula-api)
#   RACKULA_IMAGE: Frontend image override (default: ghcr.io/rackulalives/rackula:latest)
#   RACKULA_API_IMAGE: API image override (default: ghcr.io/rackulalives/rackula-api:latest)
#   CORS_ORIGIN: Allowed browser origin(s) for API CORS (default: http://localhost:8080)
#   RACKULA_API_WRITE_TOKEN: Optional token protecting API PUT/DELETE routes
#   RACKULA_AUTH_MODE: Auth mode toggle (none|oidc|local, default: none)
#   RACKULA_AUTH_SESSION_SECRET: Required when auth mode != none (min 32 chars)
#   RACKULA_AUTH_SESSION_MAX_AGE_SECONDS: Absolute auth session lifetime (default: 43200)
#   RACKULA_AUTH_SESSION_IDLE_TIMEOUT_SECONDS: Idle session timeout (default: 1800)
#   RACKULA_AUTH_SESSION_GENERATION: Increment to invalidate all active sessions
#   RACKULA_AUTH_SESSION_COOKIE_SAMESITE: Session cookie SameSite policy (default: Lax)
#   RACKULA_AUTH_SESSION_COOKIE_SECURE: Optional Secure cookie override
#   RACKULA_AUTH_CSRF_PROTECTION: Enable CSRF checks for cookie-authenticated writes
#   ALLOW_INSECURE_CORS: Explicit insecure fallback for wildcard CORS in production (default: false)

# Rackula with Persistence - Self-Hosting Quick Start
#
# Usage:
#   mkdir -p data && sudo chown 1001:1001 data
#   docker compose up -d
#   Open http://localhost:8080
#
# Documentation: https://github.com/RackulaLives/Rackula/blob/main/docs/deployment/SELF-HOSTING.md

services:
  rackula:
    image: ghcr.io/rackulalives/rackula:persist
    container_name: rackula
    ports:
      - "${RACKULA_PORT:-6565}:${RACKULA_LISTEN_PORT:-6565}"
    environment:
      - API_HOST=rackula-api
      - API_PORT=${RACKULA_API_PORT:-3001}
      - RACKULA_LISTEN_PORT=${RACKULA_LISTEN_PORT:-6565}
      # Optional: token forwarded to API for PUT/DELETE route auth
      - API_WRITE_TOKEN=${RACKULA_API_TOKEN}
      # Auth mode for nginx routing behavior
      - RACKULA_AUTH_MODE=${RACKULA_AUTH_MODE:-none}
      # Storage mode for the frontend (browser|server). This stack provisions
      # the API, so layouts save server-side by default.
      - RACKULA_STORAGE_MODE=${RACKULA_STORAGE_MODE:-server}
      # IPv6 listen: auto-detect (default), force on, or force off
      - RACKULA_ENABLE_IPV6=${RACKULA_ENABLE_IPV6:-auto}
      # DNS resolver for nginx upstream resolution (override for Kubernetes)
      - NGINX_RESOLVER=${NGINX_RESOLVER:-127.0.0.11}
      # Set to 1 when Rackula is behind a trusted reverse proxy.
      # Required for correct https:// scheme in auth redirects (reads X-Forwarded-Proto).
      # Your proxy must also forward the original Host header unchanged — including any
      # non-standard external port — because auth redirects use the Host header for
      # the redirect authority (e.g. proxy_set_header Host $host in nginx).
      # Leave at 0 (default) for direct access — prevents open-redirect abuse.
      - RACKULA_TRUST_PROXY=${RACKULA_TRUST_PROXY:-1}
    restart: unless-stopped
    stop_grace_period: 10s
    depends_on:
      rackula-api:
        condition: service_healthy

    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 128M
        reservations:
          cpus: "0.10"
          memory: 16M

    # Security hardening (optional but recommended)
    #security_opt:
    #  - no-new-privileges:true
    #cap_drop:
    #  - ALL
    #read_only: true
    #tmpfs:
    #  - /var/cache/nginx:size=10M
    #  - /var/run:size=1M
    #  - /tmp:size=5M
    #  - /etc/nginx/conf.d:size=1M,uid=101,gid=101

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  rackula-api:
    image: ghcr.io/rackulalives/rackula-api:latest
    container_name: rackula-api
    restart: unless-stopped
    stop_grace_period: 10s
    volumes:
      - /var/lib/rackula:/data
    environment:
      - DATA_DIR=/data
      - RACKULA_API_PORT=${RACKULA_API_PORT:-3001}
      # Production: explicitly set CORS_ORIGIN to your real app origin,
      # keep ALLOW_INSECURE_CORS=false, and set RACKULA_API_WRITE_TOKEN.
      # The localhost default is only for local development convenience.
      - CORS_ORIGIN=${CORS_ORIGIN:-https://rackula.zouzounet.nl}
      # Optional (recommended): protects PUT/DELETE routes via Bearer token
      - RACKULA_API_WRITE_TOKEN=${RACKULA_API_TOKEN}
      # Auth mode model: none | oidc | local
      - RACKULA_AUTH_MODE=${RACKULA_AUTH_MODE:-none}
      # Required when auth mode is enabled (oidc/local)
      # API startup validation fails fast if this is missing/short (minimum 32 chars).
      - RACKULA_AUTH_SESSION_SECRET=${RACKULA_AUTH_SECRET}
      # Local auth credentials (required when RACKULA_AUTH_MODE=local)
      # In production, prefer Docker secrets or an .env file with restricted permissions
      # rather than inline values visible in container metadata.
      - RACKULA_LOCAL_USERNAME=${RACKULA_PASSWORD}
      - RACKULA_LOCAL_PASSWORD=${RACKULA_USER}
      # Session hardening defaults
      - RACKULA_AUTH_SESSION_MAX_AGE_SECONDS=${RACKULA_AUTH_SESSION_MAX_AGE_SECONDS:-43200}
      - RACKULA_AUTH_SESSION_IDLE_TIMEOUT_SECONDS=${RACKULA_AUTH_SESSION_IDLE_TIMEOUT_SECONDS:-1800}
      - RACKULA_AUTH_SESSION_GENERATION=${RACKULA_AUTH_SESSION_GENERATION:-0}
      - RACKULA_AUTH_SESSION_COOKIE_SAMESITE=${RACKULA_AUTH_SESSION_COOKIE_SAMESITE:-Lax}
      # Production-safe default. Set false only for local HTTP auth testing.
      - RACKULA_AUTH_SESSION_COOKIE_SECURE=${RACKULA_AUTH_SESSION_COOKIE_SECURE:-true}
      - RACKULA_AUTH_CSRF_PROTECTION=${RACKULA_AUTH_CSRF_PROTECTION:-true}
      # Explicit insecure fallback (use only for isolated/local testing)
      - ALLOW_INSECURE_CORS=${ALLOW_INSECURE_CORS:-false}

    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M
        reservations:
          cpus: "0.05"
          memory: 16M

    # Security hardening
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:size=5M

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:${RACKULA_API_PORT:-3001}/health",
        ]
      interval: 30s
      timeout: 10s
      start_period: 5s
      retries: 3

    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

    expose:
      - "${RACKULA_API_PORT:-3001}"